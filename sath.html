<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Gaming Tips Hub</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:linear-gradient(135deg,#141e30,#243b55);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:900px;
    background:rgba(255,255,255,0.08);
    padding:30px;
    border-radius:20px;
}

h1{
    color:white;
    text-align:center;
    margin-bottom:25px;
}

.search-box{
    display:flex;
    gap:10px;
}

input{
    flex:1;
    padding:15px;
    font-size:18px;
    border:none;
    border-radius:10px;
}

button{
    padding:15px 25px;
    border:none;
    border-radius:10px;
    background:#2ecc71;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#27ae60;
}

#result{
    margin-top:20px;
    background:rgba(0,0,0,0.25);
    color:white;
    padding:20px;
    border-radius:10px;
    line-height:1.7;
}
</style>
</head>

<body>

<div class="container">

<h1>🎮 AI Gaming Tips Hub</h1>

<div class="search-box">
<input
id="gameInput"
type="text"
placeholder="Enter game name..."
>

<button onclick="searchGame()">
Search
</button>
</div>

<div id="result">
Enter a game name and click Search.
</div>

</div>

<script>
async function searchGame(){

    const game =
    document.getElementById("gameInput").value;

    const result =
    document.getElementById("result");

    if(!game){
        result.innerHTML =
        "Please enter a game name.";
        return;
    }

    result.innerHTML = "Loading...";

    try{

        const response =
        await fetch(
        "http://localhost:3000/tips",
        {
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                game:game
            })
        });

        const data =
        await response.json();

        if(data.error){

            result.innerHTML =
            "<b>Error:</b> " +
            data.error;

            return;
        }

        result.innerHTML = `
        <h2>${game}</h2>
        <br>
        <div>${data.tips}</div>
        `;

    }catch(error){

        result.innerHTML =
        "Could not connect to AI server.";

    }
}
</script>

</body>
</html>
