<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Gaming Tips Hub</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#1e3c72;
    color:white;
    text-align:center;
    padding:40px;
}

.container{
    max-width:900px;
    margin:auto;
}

input{
    width:70%;
    padding:12px;
    font-size:18px;
    border:none;
    border-radius:5px;
}

button{
    padding:12px 20px;
    font-size:18px;
    border:none;
    border-radius:5px;
    background:green;
    color:white;
    cursor:pointer;
}

#result{
    margin-top:20px;
    background:#ffffff22;
    padding:20px;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>🎮 AI Gaming Tips Hub</h1>

<input
id="gameInput"
type="text"
placeholder="Enter game name">

<button onclick="searchGame()">
Search
</button>

<div id="result">
Enter a game name and click Search.
</div>

</div>

<script>

async function searchGame(){

const game =
document.getElementById("gameInput").value;

const result =
document.getElementById("result");

if(!game){
    result.innerHTML =
    "Please enter a game name.";
    return;
}

result.innerHTML = "Loading...";

try{

const response = await fetch(
"https://ai-gaming-tips-hub-production.up.railway.app/tips",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
game:game
})
}
);

const data =
await response.json();

if(data.error){

result.innerHTML =
"<b>Error:</b> " +
data.error;

}else{

result.innerHTML =
"<h3>" + game + "</h3><hr>" +
data.tips;

}

}catch(error){

result.innerHTML =
"Could not connect to AI server.";

}

}

</script>

</body>
</html>
